<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Sheet Links</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Shared workspace</p>
          <h1>Google Sheet Links</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="refreshButton" type="button" title="Refresh data" aria-label="Refresh data">
            ↻
          </button>
        </div>
      </header>

      <section class="toolbar" aria-label="Task controls">
        <label class="search-field">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Task, description, category..." autocomplete="off" />
        </label>

        <label class="select-field">
          <span>Status</span>
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
          </select>
        </label>
      </section>

      <section class="summary-grid" id="summaryGrid" aria-label="Task summary"></section>

      <nav class="tabs" id="categoryTabs" aria-label="Categories"></nav>

      <section class="status-panel" id="messagePanel" hidden></section>

      <section class="task-grid" id="taskGrid" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
